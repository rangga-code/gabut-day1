<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Cetak Soal Modern</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* CSS Variables - Tema Putih & Biru */
        :root {
            --bg-praktek: #f8fafc;
            --bg-card: #ffffff;
            --primary: #2563eb;       
            --primary-hover: #1d4ed8; 
            --text-main: #1e293b;     
            --text-muted: #64748b;    
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-praktek);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 1rem 2rem;
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.25rem;
            color: var(--primary);
            font-weight: 700;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        /* Konten Utama */
        main {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Area Tampilan & Cetak Soal */
        #print-area {
            background: var(--bg-card);
            border-radius: 0.75rem;
            box-shadow: var(--shadow);
            padding: 2.5rem;
        }

        /* Styling per Bab Soal */
        .quiz-section {
            margin-bottom: 3.5rem;
        }

        .quiz-section:last-child {
            margin-bottom: 0;
        }

        .quiz-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            text-transform: capitalize;
        }

        .question-card {
            margin-bottom: 1.75rem;
            page-break-inside: avoid; /* Mencegah soal terpotong di tengah halaman PDF */
        }

        .question-text {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 0.5rem;
            display: flex;
            gap: 0.5rem;
        }

        .options-list {
            list-style: none;
            padding-left: 1.5rem;
        }

        .option-item {
            margin-bottom: 0.25rem;
            display: flex;
            align-items: flex-start;
        }

        .option-letter {
            font-weight: 600;
            margin-right: 0.5rem;
            min-width: 20px;
        }

        .loading {
            text-align: center;
            font-weight: 500;
            color: var(--primary);
            padding: 2rem;
        }

        .error-msg {
            color: #dc2626;
            background-color: #fef2f2;
            padding: 0.75rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        /* Mobile Friendly */
        @media (max-width: 640px) {
            header { padding: 1rem; }
            .header-container { flex-direction: column; align-items: stretch; text-align: center;}
            .btn { width: 100%; }
            #print-area { padding: 1.25rem; }
            .quiz-title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <h1>Panel Daftar Soal</h1>
            </div>
            <div class="controls">
                <button id="download-btn" class="btn btn-primary">
                    📥 Download PDF
                </button>
            </div>
        </div>
    </header>

    <main>
        <div id="status-container"></div>
        
        <div id="print-area">
            <div id="loading" class="loading">Sedang memuat seluruh soal dari folder...</div>
            <div id="quiz-container"></div>
        </div>
    </main>

    <script>
        // ==========================================
        // 1. DAFTARKAN NAMA FILE JSON ANDA DI SINI
        // ==========================================
        // Tuliskan semua nama file JSON yang ada di dalam "folder soal/" Anda.
        // Nama judul halaman akan otomatis diambil dari nama file ini.
        const daftarFileSoal = [
            "soal-komputer.json",
            "soal-bahasa.json"
            // Tambahkan nama file lainnya di sini seiring bertambahnya soal
        ];

        const folderPath = "folder soal/";

        document.getElementById('download-btn').addEventListener('click', downloadPDF);
        
        // Jalankan fungsi load data otomatis saat halaman dibuka
        window.addEventListener('DOMContentLoaded', loadSemuaSoal);

        async function loadSemuaSoal() {
            const container = document.getElementById('quiz-container');
            const loadingElement = document.getElementById('loading');
            const statusContainer = document.getElementById('status-container');
            
            if (daftarFileSoal.length === 0) {
                loadingElement.innerText = "Belum ada file JSON yang didaftarkan di dalam kode.";
                return;
            }

            for (const fileName of daftarFileSoal) {
                // Nama soal otomatis dari nama file (menghilangkan .json, '-' atau '_')
                const judulSoal = fileName.replace(/\.[^/.]+$/, "").replace(/[-_]/g, " ");
                const fullUrl = folderPath + fileName;

                try {
                    const response = await fetch(fullUrl);
                    if (!response.ok) {
                        throw new Error(`Gagal memuat file: ${fileName} (Status: ${response.status})`);
                    }
                    
                    const jsonData = await response.json();
                    const daftarSoal = jsonData.soal ? jsonData.soal : jsonData;

                    if (Array.isArray(daftarSoal)) {
                        renderQuiz(judulSoal, daftarSoal);
                    }
                } catch (error) {
                    console.error(error);
                    const errDiv = document.createElement('div');
                    errDiv.className = 'error-msg';
                    errDiv.innerText = `⚠️ Perhatian: File "${fileName}" tidak dapat diakses atau format salah. Pastikan file ada di dalam 'folder soal/'`;
                    statusContainer.appendChild(errDiv);
                }
            }

            // Hilangkan text loading jika proses selesai
            loadingElement.style.display = 'none';
        }

        function renderQuiz(title, questions) {
            const container = document.getElementById('quiz-container');

            const section = document.createElement('div');
            section.className = 'quiz-section';

            const sectionTitle = document.createElement('h2');
            sectionTitle.className = 'quiz-title';
            sectionTitle.innerText = title;
            section.appendChild(sectionTitle);

            questions.forEach((item) => {
                const qCard = document.createElement('div');
                qCard.className = 'question-card';

                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerHTML = `<span>${item.nomor || ''}.</span> <span>${item.soal}</span>`;
                qCard.appendChild(qText);

                if (item.pilihan && typeof item.pilihan === 'object') {
                    const oList = document.createElement('ul');
                    oList.className = 'options-list';

                    Object.keys(item.pilihan).forEach(key => {
                        const oItem = document.createElement('li');
                        oItem.className = 'option-item';
                        oItem.innerHTML = `<span class="option-letter">${key}.</span> <span>${item.pilihan[key]}</span>`;
                        oList.appendChild(oItem);
                    });
                    qCard.appendChild(oList);
                }

                section.appendChild(qCard);
            });

            container.appendChild(section);
        }

        function downloadPDF() {
            const element = document.getElementById('print-area');
            const opt = {
                margin:       [12, 12, 12, 12],
                filename:     'Kumpulan_Soal_Lengkap.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: ['css', 'legacy'] } 
            };

            const btn = document.getElementById('download-btn');
            const originalText = btn.innerText;
            btn.innerText = "⏳ Memproses PDF...";
            btn.disabled = true;

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerText = originalText;
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                btn.innerText = originalText;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
