<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IQC PRO V2 - NEO BRUTALISM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

    <div class="app-container">
        <header class="neo-header">
            <div class="brand">
                <span>GENERATOR V2</span>
                <h1>IQC PRO</h1>
            </div>
            <div class="status-badge">
                <span class="dot"></span> READY
            </div>
        </header>

        <section class="neo-box preview-box" id="resultContainer">
            <div class="placeholder-content" id="placeholder">
                <i class="fas fa-bolt-lightning"></i>
                <p>READY TO GENERATE IPHONE CHAT</p>
            </div>
            <div class="cyber-loader" id="loader"></div>
            <img id="resultImage" alt="Generated Chat Preview">
        </section>

        <main class="neo-box form-box">
            
            <div class="input-group">
                <label>KUSTOM WAKTU (TIME)</label>
                <input type="text" id="timeInput" value="12:00" placeholder="Contoh: 09:45">
            </div>

            <div class="input-group">
                <label>URL GAMBAR PESAN / IMAGE URL (OPSIONAL)</label>
                <input type="text" id="imageInput" placeholder="Masukkan link gambar jika ada...">
            </div>

            <div class="input-group">
                <label>ISI PESAN CHAT (TEXT)</label>
                <input type="text" id="messageInput" placeholder="Tulis isi pesan palsu disini..." autocomplete="off">
            </div>

            <div class="tags-container" id="tagsContainer">
                <span class="neo-tag">P, Lagi dimana? Balas dong.</span>
                <span class="neo-tag">I love you so much ❤️</span>
                <span class="neo-tag">Transferan sudah masuk, makasih!</span>
            </div>

            <div class="action-buttons">
                <button class="neo-btn btn-primary" id="generateBtn">
                    <i class="fas fa-wand-magic-sparkles"></i> GENERATE CHAT
                </button>
                <button class="neo-btn btn-secondary" id="downloadBtn">
                    <i class="fas fa-download"></i> SIMPAN GAMBAR
                </button>
            </div>

        </main>
        
        <footer class="neo-footer">
            DEVELOPED BY <b>RANGGA CODE</b>
        </footer>
    </div>

    <script src="src/js/api.js"></script>
    <script src="src/js/ui.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
