<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IQC PRO V2 - NEO BRUTALISM EDITION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

    <div class="app-container">
        <header class="neo-header">
            <div class="brand">
                <span>SYSTEM V2</span>
                <h1>IQC PRO</h1>
            </div>
            <div class="status-badge">
                <span class="dot"></span> ONLINE
            </div>
        </header>

        <section class="neo-box preview-box" id="resultContainer">
            <div class="placeholder-content" id="placeholder">
                <i class="fas fa-bolt-lightning"></i>
                <p>READY TO GENERATE FAKE CHAT v2</p>
            </div>
            <div class="cyber-loader" id="loader"></div>
            <img id="resultImage" alt="Generated Chat Preview">
        </section>

        <main class="neo-box form-box">
            
            <div class="input-row">
                <div class="input-group">
                    <label>PROVIDER (CARRIER)</label>
                    <input type="text" id="carrierInput" value="INDOSAT">
                </div>
                <div class="input-group">
                    <label>BATERAI (%)</label>
                    <input type="number" id="batteryInput" value="100" min="1" max="100">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>WAKTU / TIMESTAMP</label>
                    <input type="text" id="timeInput" value="12.00">
                </div>
                <div class="input-group">
                    <label>PENGIRIM</label>
                    <input type="text" id="senderInput" value="other" placeholder="me / other">
                </div>
            </div>

            <div class="input-group">
                <label>URL GAMBAR PESAN (OPSIONAL)</label>
                <input type="text" id="imageInput" placeholder="https://link-gambar.jpg">
            </div>

            <div class="input-group">
                <label>URL BACKGROUND CANVAS (OPSIONAL)</label>
                <input type="text" id="bgInput" placeholder="https://link-background.jpg">
            </div>

            <div class="input-group">
                <label>ISI PESAN CHAT</label>
                <input type="text" id="messageInput" placeholder="Tulis isi pesan palsu disini..." autocomplete="off">
            </div>

            <div class="tags-container" id="tagsContainer">
                <span class="neo-tag">P, Lagi dimana?</span>
                <span class="neo-tag">I love you! ❤️</span>
                <span class="neo-tag">Otw bosku 🏃‍♂️</span>
            </div>

            <div class="action-buttons">
                <button class="neo-btn btn-primary" id="generateBtn">
                    <i class="fas fa-wand-magic-sparkles"></i> GENERATE CHAT
                </button>
                <button class="neo-btn btn-secondary" id="downloadBtn">
                    <i class="fas fa-download"></i> SIMPAN GAMBAR
                </button>
            </div>

        </main>
        
        <footer class="neo-footer">
            DEVELOPED BY <b>RANGGA CODE</b>
        </footer>
    </div>

    <script src="src/js/api.js"></script>
    <script src="src/js/ui.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
